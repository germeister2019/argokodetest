apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: automated-lifecycle-app
  namespace: argocd                 # Match KodeKloud's Argo CD deployment namespace
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default                  # Uses the default built-in access policy
  source:
    repoURL: 'https://github.com/germeister2019/argokodetest' # Public test repo
    targetRevision: HEAD            # Tracks the latest commit automatically
    path: guestbook                 # Directory containing the Kubernetes YAML files
  destination:
    server: 'https://kubernetes.default.svc' # Deploys to KodeKloud's internal cluster
    namespace: default              # Target namespace for your application workload
  syncPolicy:
    automated:                      # Evaluates and enforces Git state continuously
      prune: true                   # Deletes resources in the cluster if removed from Git
      selfHeal: true                # Automatically overwrites manual cluster deviations
